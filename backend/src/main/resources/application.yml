spring:
  application:
    name: happynovel-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/happynovel}
    username: ${DATABASE_USERNAME:happynovel}
    password: ${DATABASE_PASSWORD:happynovel}
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:change-me}
    repository-mode: ${ADMIN_REPOSITORY_MODE:SEED}
  audit:
    repository-mode: ${AUDIT_REPOSITORY_MODE:SEED}
  content:
    repository-mode: ${CONTENT_REPOSITORY_MODE:SEED}
  glossary:
    repository-mode: ${GLOSSARY_REPOSITORY_MODE:SEED}
  publication:
    repository-mode: ${PUBLICATION_REPOSITORY_MODE:SEED}
  reading:
    repository-mode: ${READING_REPOSITORY_MODE:SEED}
  crawling:
    repository-mode: ${CRAWLING_REPOSITORY_MODE:SEED}
    scheduler:
      enabled: ${CRAWLING_SCHEDULER_ENABLED:false}
      fixed-delay-ms: ${CRAWLING_SCHEDULER_FIXED_DELAY_MS:60000}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-5-mini}
