services:
  postgres:
    image: postgres:16
    container_name: happynovel-postgres
    environment:
      POSTGRES_DB: happynovel
      POSTGRES_USER: happynovel
      POSTGRES_PASSWORD: happynovel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: happynovel-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
